<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constant Phasor Simulator</title>
    <style>
        :root {
            --bg-color: #191919; 
            --panel-bg: rgba(32, 32, 32, 0.85);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-color: #EBEBEB;
            --accent: #ff6b6b;
            --accent-hover: #ff8787;
            --track-bg: #3a3a3a;
        }
        
        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100%; overflow-y: auto; padding: 30px 15px; margin: 0; box-sizing: border-box;
        }

        .container {
            width: 100%; max-width: 600px; background-color: var(--panel-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 28px; border-radius: 20px; border: 1px solid var(--panel-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); box-sizing: border-box; margin-bottom: 20px;
        }

        .controls { display: flex; flex-direction: column; gap: 24px; }
        .slider-group { display: flex; flex-direction: column; gap: 12px; }
        .slider-header { display: flex; justify-content: space-between; align-items: center; }
        .slider-label { font-size: 14px; font-weight: 500; letter-spacing: 0.2px; }
        .slider-value { color: var(--accent); background: rgba(255, 107, 107, 0.1); padding: 4px 10px; border-radius: 8px; font-family: monospace; font-size: 13px; font-weight: 600; }

        input[type=range] { width: 100%; height: 6px; background: var(--track-bg); border-radius: 6px; appearance: none; outline: none; cursor: pointer; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #ffffff; border: 4px solid var(--accent); cursor: pointer; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3); transition: transform 0.15s; }
        
        .info-header {
            width: 100%; max-width: 600px; background-color: var(--panel-bg);
            padding: 15px; border-radius: 12px; border: 1px solid var(--panel-border);
            margin-bottom: 20px; text-align: center; font-size: 14px; font-weight: 500;
            box-sizing: border-box; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .info-header span { color: var(--accent); font-family: monospace; font-size: 15px; font-weight: 700; background: rgba(255,107,107,0.1); padding: 4px 10px; border-radius: 6px;}

        .canvas-wrapper { width: 100%; max-width: 600px; aspect-ratio: 1 / 1; background-color: #fdfdfd; border-radius: 20px; overflow: hidden; border: 1px solid var(--panel-border); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); }
        canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <div class="controls">
            <div class="slider-group">
                <div class="slider-header">
                    <span class="slider-label">Number of waves (M)</span>
                    <span class="slider-value" id="m-val">16</span>
                </div>
                <input type="range" id="m-slider" min="1" max="20" value="16" step="1">
            </div>
            <div class="slider-group">
                <div class="slider-header">
                    <span class="slider-label">Total Phase Constraint</span>
                    <span class="slider-value" id="phase-val">4.28 rad</span>
                </div>
                <input type="range" id="phase-slider" min="0" max="6.283185" value="4.28" step="0.01">
            </div>
        </div>
    </div>

    <!-- New Phase Difference Header -->
    <div class="info-header">
        Phase step per wave (Δϕ): <span id="dphi-display">0.00 rad</span>
    </div>

    <div class="canvas-wrapper">
        <canvas id="canvas" width="1200" height="1200"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const mSlider = document.getElementById('m-slider');
        const phaseSlider = document.getElementById('phase-slider');
        const dphiDisplay = document.getElementById('dphi-display');

        function updateSliderTrack(slider) {
            const min = parseFloat(slider.min) || 0, max = parseFloat(slider.max) || 100, val = parseFloat(slider.value);
            const percentage = ((val - min) / (max - min)) * 100;
            slider.style.background = `linear-gradient(to right, var(--accent) ${percentage}%, var(--track-bg) ${percentage}%)`;
        }

        function drawArrow(fromX, fromY, toX, toY, color, width) {
            const headlen = 22, dx = toX - fromX, dy = toY - fromY, angle = Math.atan2(dy, dx);
            ctx.beginPath(); ctx.moveTo(fromX, fromY); ctx.lineTo(toX, toY); ctx.strokeStyle = color; ctx.lineWidth = width; ctx.lineCap = 'round'; ctx.stroke();
            ctx.beginPath(); ctx.moveTo(toX, toY); ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI/7), toY - headlen * Math.sin(angle - Math.PI/7));
            ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI/7), toY - headlen * Math.sin(angle + Math.PI/7)); ctx.lineTo(toX, toY); ctx.fillStyle = color; ctx.fill();
        }

        function draw() {
            const M = parseInt(mSlider.value), totalPhase = parseFloat(phaseSlider.value);
            document.getElementById('m-val').textContent = M;
            document.getElementById('phase-val').textContent = totalPhase.toFixed(2) + " rad";
            updateSliderTrack(mSlider); updateSliderTrack(phaseSlider);

            // Mathematical Fix: dPhi depends on gaps (M-1)
            const dPhi = M > 1 ? totalPhase / (M - 1) : 0;
            const dPhiDeg = dPhi * (180 / Math.PI);
            
            // Update the new header
            dphiDisplay.textContent = `${dPhi.toFixed(2)} rad (${dPhiDeg.toFixed(1)}°)`;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const viewM = Math.max(M, 4), viewRange = 1.6 * viewM, scale = canvas.width / viewRange;
            const originX = canvas.width * (0.5 * viewM / viewRange), originY = canvas.height * (1.1 * viewM / viewRange);

            ctx.lineWidth = 1.5; const step = scale; 
            for(let i = 0; i <= viewRange; i++) {
                const vx = originX + (i * step), vnx = originX - (i * step);
                ctx.strokeStyle = (i === 0) ? '#b0bec5' : '#f0f2f5';
                ctx.beginPath(); ctx.moveTo(vx, 0); ctx.lineTo(vx, canvas.height); ctx.stroke();
                if(i > 0) { ctx.beginPath(); ctx.moveTo(vnx, 0); ctx.lineTo(vnx, canvas.height); ctx.stroke(); }
                const hy = originY - (i * step), hny = originY + (i * step);
                ctx.beginPath(); ctx.moveTo(0, hy); ctx.lineTo(canvas.width, hy); ctx.stroke();
                if(i > 0) { ctx.beginPath(); ctx.moveTo(0, hny); ctx.lineTo(canvas.width, hny); ctx.stroke(); }
            }

            let x = 0, y = 0; const coords = [[x, y]];
            for(let i=0; i<M; i++) { x += Math.cos(i * dPhi); y += Math.sin(i * dPhi); coords.push([x, y]); }
            for(let i=0; i<M; i++) {
                drawArrow(originX + coords[i][0]*scale, originY - coords[i][1]*scale, originX + coords[i+1][0]*scale, originY - coords[i+1][1]*scale, '#374151', 5);
            }
            drawArrow(originX, originY, originX + coords[M][0]*scale, originY - coords[M][1]*scale, '#ff6b6b', 7);
        }

        mSlider.addEventListener('input', draw); phaseSlider.addEventListener('input', draw); window.addEventListener('resize', draw); draw(); 
    </script>
</body>
</html>
