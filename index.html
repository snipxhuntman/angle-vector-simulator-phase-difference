<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Removed scale restrictions to allow native browser behavior and scrolling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phasor Simulator</title>
    <style>
        :root {
            /* Notion Dark Mode perfectly matched */
            --bg-color: #191919; 
            --panel-bg: rgba(32, 32, 32, 0.85);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-color: #EBEBEB;
            --text-muted: #A0A0A0;
            --accent: #ff6b6b;
            --accent-hover: #ff8787;
            --track-bg: #3a3a3a;
        }
        
        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Allow natural document flow for scrolling */
            min-height: 100%;
            overflow-y: auto;
            padding: 30px 15px;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 28px;
            border-radius: 20px;
            border: 1px solid var(--panel-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slider-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-color);
            letter-spacing: 0.2px;
        }

        .slider-value {
            color: var(--accent);
            background: rgba(255, 107, 107, 0.1);
            padding: 4px 10px;
            border-radius: 8px;
            font-family: "SF Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 13px;
            font-weight: 600;
        }

        /* Premium Dynamic Sliders */
        input[type=range] {
            width: 100%;
            height: 6px;
            background: var(--track-bg);
            border-radius: 6px;
            appearance: none;
            outline: none;
            cursor: pointer;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ffffff;
            border: 4px solid var(--accent);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.15s cubic-bezier(0.2, 0, 0.2, 1), border-width 0.15s ease;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            border-width: 5px;
        }

        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(0.95);
            border-color: var(--accent-hover);
        }

        .canvas-wrapper {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
            background-color: #fdfdfd;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--panel-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        @media (max-width: 600px) {
            body { padding: 15px 10px; }
            .container { padding: 20px; border-radius: 16px; }
            .canvas-wrapper { border-radius: 16px; }
            input[type=range]::-webkit-slider-thumb {
                width: 24px; height: 24px; border-width: 5px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="controls">
            <div class="slider-group">
                <div class="slider-header">
                    <span class="slider-label">Number of waves (M)</span>
                    <span class="slider-value" id="m-val">16</span>
                </div>
                <input type="range" id="m-slider" min="1" max="20" value="16" step="1">
            </div>
            
            <div class="slider-group">
                <div class="slider-header">
                    <span class="slider-label">Total Phase Constraint</span>
                    <span class="slider-value" id="phase-val">4.28 rad</span>
                </div>
                <input type="range" id="phase-slider" min="0" max="6.283185" value="4.28" step="0.01">
            </div>
        </div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="canvas" width="1200" height="1200"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const mSlider = document.getElementById('m-slider');
        const phaseSlider = document.getElementById('phase-slider');
        const mVal = document.getElementById('m-val');
        const phaseVal = document.getElementById('phase-val');

        // Dynamic slider fill logic
        function updateSliderTrack(slider) {
            const min = parseFloat(slider.min) || 0;
            const max = parseFloat(slider.max) || 100;
            const val = parseFloat(slider.value);
            const percentage = ((val - min) / (max - min)) * 100;
            slider.style.background = `linear-gradient(to right, var(--accent) ${percentage}%, var(--track-bg) ${percentage}%)`;
        }

        function drawArrow(fromX, fromY, toX, toY, color, width) {
            const headlen = 22; 
            const dx = toX - fromX;
            const dy = toY - fromY;
            const angle = Math.atan2(dy, dx);

            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(toX, toY);
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 7), toY - headlen * Math.sin(angle - Math.PI / 7));
            ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 7), toY - headlen * Math.sin(angle + Math.PI / 7));
            ctx.lineTo(toX, toY);
            ctx.fillStyle = color;
            ctx.fill();
        }

        function draw() {
            // Update UI
            const M = parseInt(mSlider.value);
            const totalPhase = parseFloat(phaseSlider.value);
            mVal.textContent = M;
            phaseVal.textContent = totalPhase.toFixed(2) + " rad";
            
            updateSliderTrack(mSlider);
            updateSliderTrack(phaseSlider);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dynamic Window Calculation
            const viewM = Math.max(M, 4); 
            const viewRange = 1.6 * viewM; 
            const scale = canvas.width / viewRange;
            
            const originX = canvas.width * (0.5 * viewM / viewRange);
            const originY = canvas.height * (1.1 * viewM / viewRange);

            // Draw polished engineering grid
            ctx.lineWidth = 1.5;
            const step = scale; 
            
            for(let i = 0; i <= viewRange; i++) {
                const vx = originX + (i * step);
                const vnx = originX - (i * step);
                
                // Emphasize zero-axes in light blue-gray, lighten the rest
                ctx.strokeStyle = (i === 0) ? '#b0bec5' : '#f0f2f5';
                
                ctx.beginPath(); ctx.moveTo(vx, 0); ctx.lineTo(vx, canvas.height); ctx.stroke();
                if(i > 0) { ctx.beginPath(); ctx.moveTo(vnx, 0); ctx.lineTo(vnx, canvas.height); ctx.stroke(); }
                
                const hy = originY - (i * step);
                const hny = originY + (i * step);
                
                ctx.beginPath(); ctx.moveTo(0, hy); ctx.lineTo(canvas.width, hy); ctx.stroke();
                if(i > 0) { ctx.beginPath(); ctx.moveTo(0, hny); ctx.lineTo(canvas.width, hny); ctx.stroke(); }
            }

            const dPhi = totalPhase / M;
            let x = 0, y = 0;
            const coords = [[x, y]];

            for(let i=0; i<M; i++) {
                x += Math.cos(i * dPhi);
                y += Math.sin(i * dPhi);
                coords.push([x, y]);
            }

            // Draw individual vectors (Graphite)
            for(let i=0; i<M; i++) {
                const startX = originX + coords[i][0] * scale;
                const startY = originY - coords[i][1] * scale; 
                const endX = originX + coords[i+1][0] * scale;
                const endY = originY - coords[i+1][1] * scale;
                drawArrow(startX, startY, endX, endY, '#374151', 5);
            }

            // Draw resultant vector (Red Accent)
            const resEndX = originX + coords[M][0] * scale;
            const resEndY = originY - coords[M][1] * scale;
            drawArrow(originX, originY, resEndX, resEndY, '#ff6b6b', 7);
        }

        mSlider.addEventListener('input', draw);
        phaseSlider.addEventListener('input', draw);
        window.addEventListener('resize', draw);

        draw(); 
    </script>
</body>
</html>
